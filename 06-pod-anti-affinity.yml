apiVersion: v1
kind: Pod
metadata:
  name: pod-2
  labels:
    purpose: demo 
spec:
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: purpose
            operator: In
            values:
            - demo
        topologyKey: "kubernetes.io/hostname"
